<svg
  class="diagram-root"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 1100 800"
  width="100%"
  height="100%"
  preserveAspectRatio="xMidYMid meet"
>
<style>
.diagram-root { font-family: "Helvetica Neue", sans-serif; font-size: 12px; }
.t { overflow: visible; }
.t-bg { y: 40; fill: #fff; }
.th { fill: #005aa0; }
.tht { fill: #fff; font-size: 14px; }
.tf { fill: #323c46; overflow: visible; }
.tf.pk { fill: #005aa0; font-weight: bold; }
.tf.fk { font-weight: bold; }
.ty { fill: #adb1b5; font-weight: normal; text-anchor: end; }
.r { fill: transparent; stroke: #c3c3c3; stroke-width: 1; }
.l { stroke: 1; }
.i { fill: #c2c7ce; stroke: #c2c7ce; }
.i.ix { fill: #afb3b6; stroke: #000; }
.fa { fill: transparent; overflow: visible; }
.fa .bg.hover { fill: #f7f7f7; }
.c { cy: 12; r: 4; stroke: #d2d2dc; fill: #d2d2dc; }
.hr { fill: transparent; stroke: #323c46; stroke-opacity: 0.035; stroke-width: 13; }
.dc { stroke: #fa5a3c; fill: #fa5a3c; }
.x { stroke: white; stroke-width: 1; }
.hl .th { fill: #1b9bff; }
.hl .tht { }
.fhl .bg { fill: #e7f4ff; }
.r.hl { stroke: #1b9bff; }
.dim { opacity: 0.25; }
</style>

<g class="drawing-wrapper">
  <!-- сюда оставлен твой контент без изменений -->
  <!-- (QuickDBD генерация полностью сохранена) -->
</g>

</svg>
